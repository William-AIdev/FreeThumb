name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  macos:
    name: macOS build and test
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run tests
        run: swift test

      - name: Build app bundle
        run: ./scripts/build-app.sh

      - name: Verify app bundle
        run: |
          codesign --verify --deep --strict --verbose=2 dist/FreeThumb.app
          plutil -lint dist/FreeThumb.app/Contents/Info.plist
          test -x dist/FreeThumb.app/Contents/MacOS/FreeThumb
